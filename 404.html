<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — ページが見つかりません | SANEi CLOVER</title>
  <link rel="shortcut icon" href="/assets/images/favicon.ico" type="image/x-icon">
  <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho+B1:wght@400;500;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/site.css?v=4">
</head>
<body>
  <div id="header"></div>
  <script>
    fetch("/includes/header.html", { cache: "no-store" }).then(r => r.text()).then(html => {
      document.getElementById("header").outerHTML = html;
      const s = document.createElement("script"); s.src = "/assets/js/site.js?v=4"; document.body.appendChild(s);
    });
  </script>

  <main id="main">
    <section class="err">
      <div>
        <div class="hero__eyebrow eyebrow reveal" style="justify-content:center;margin-bottom:24px">Error / 404</div>
        <div class="err__no reveal" data-stagger="1">404</div>
        <h1 class="err__title reveal" data-stagger="2">ページが見つかりません</h1>
        <p class="err__desc reveal" data-stagger="3">
          お探しのページは移動または削除された可能性があります。<br>
          URLをご確認いただくか、トップページからお探しください。
        </p>
        <a href="/" class="err__btn reveal" data-stagger="4">トップへ戻る</a>
      </div>
    </section>
  </main>

  <div id="footer"></div>
  <script>
    fetch("/includes/footer.html", { cache: "no-store" }).then(r => r.text()).then(html => {
      document.getElementById("footer").outerHTML = html;
      document.querySelectorAll("[data-year]").forEach(el => el.textContent = String(new Date().getFullYear()));
    });
  </script>
</body>
</html>
